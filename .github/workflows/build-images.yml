name: Build & Push Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: gateway,      context: backend, dockerfile: backend/api-gateway/Dockerfile }
          - { name: auth,         context: backend, dockerfile: backend/services/auth-service/Dockerfile }
          - { name: academic,     context: backend, dockerfile: backend/services/academic-service/Dockerfile }
          - { name: attendance,   context: backend, dockerfile: backend/services/attendance-service/Dockerfile }
          - { name: timetable,    context: backend, dockerfile: backend/services/timetable-service/Dockerfile }
          - { name: assignment,   context: backend, dockerfile: backend/services/assignment-service/Dockerfile }
          - { name: grade,        context: backend, dockerfile: backend/services/grade-service/Dockerfile }
          - { name: career,       context: backend, dockerfile: backend/services/career-service/Dockerfile }
          - { name: notes,        context: backend, dockerfile: backend/services/notes-service/Dockerfile }
          - { name: fee,          context: backend, dockerfile: backend/services/fee-service/Dockerfile }
          - { name: library,      context: backend, dockerfile: backend/services/library-service/Dockerfile }
          - { name: forum,        context: backend, dockerfile: backend/services/forum-service/Dockerfile }
          - { name: notification, context: backend, dockerfile: backend/services/notification-service/Dockerfile }
          - { name: admin,        context: backend, dockerfile: backend/services/admin-service/Dockerfile }
          - { name: ml,           context: backend/services/ml-service, dockerfile: backend/services/ml-service/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repo_lc}-${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.ref_name }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
