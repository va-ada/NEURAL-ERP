version: '3.8'

# ─── Production compose ────────────────────────────────────────────────────
# Builds all microservice images locally and runs them behind nginx.
# Image names follow: ${REGISTRY:-localhost}/neural-erp-<service>:${TAG:-latest}
# Resource limits are commented out — uncomment to enforce.
# Build context for every Node service is `.` (the backend/ directory) so
# they can reach `package-lock.json`, `shared/`, and `database/`.

x-node-env: &node-env
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL:-postgresql://neural_admin:neural_secret_2026@postgres:5432/neural_erp}
  REDIS_URL: ${REDIS_URL:-redis://:neural_redis_2026@redis:6379}
  MONGO_URL: ${MONGO_URL:-mongodb://neural_admin:neural_secret_2026@mongodb:27017/neural_erp_logs?authSource=admin}
  JWT_SECRET: ${JWT_SECRET:-change-me}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}

services:
  # ─── Datastores ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: neural_erp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neural_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neural_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-neural_erp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neural_network
    # deploy:
    #   resources:
    #     limits: { cpus: '1.0', memory: 512M }
    #     reservations: { cpus: '0.25', memory: 128M }

  mongodb:
    image: mongo:7-jammy
    container_name: neural_erp_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-neural_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-neural_secret_2026}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-neural_erp_logs}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - neural_network
    # deploy:
    #   resources:
    #     limits: { cpus: '1.0', memory: 512M }

  redis:
    image: redis:7-alpine
    container_name: neural_erp_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-neural_redis_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - neural_network
    # deploy:
    #   resources:
    #     limits: { cpus: '0.5', memory: 256M }

  # ─── API Gateway ────────────────────────────────────────────────────────
  gateway:
    image: ${REGISTRY:-localhost}/neural-erp-gateway:${TAG:-latest}
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: neural_erp_gateway
    restart: always
    environment:
      <<: *node-env
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      ACADEMIC_SERVICE_URL: http://academic-service:3002
      ATTENDANCE_SERVICE_URL: http://attendance-service:3003
      TIMETABLE_SERVICE_URL: http://timetable-service:3004
      ASSIGNMENT_SERVICE_URL: http://assignment-service:3005
      GRADE_SERVICE_URL: http://grade-service:3006
      CAREER_SERVICE_URL: http://career-service:3007
      NOTES_SERVICE_URL: http://notes-service:3008
      FEE_SERVICE_URL: http://fee-service:3009
      LIBRARY_SERVICE_URL: http://library-service:3010
      FORUM_SERVICE_URL: http://forum-service:3011
      NOTIFICATION_SERVICE_URL: http://notification-service:3012
      ADMIN_SERVICE_URL: http://admin-service:3013
      ML_SERVICE_URL: http://ml-service:3014
    depends_on:
      - auth-service
      - academic-service
      - attendance-service
      - timetable-service
      - assignment-service
      - grade-service
      - career-service
      - notes-service
      - fee-service
      - library-service
      - forum-service
      - notification-service
      - admin-service
      - ml-service
    networks:
      - neural_network
    # deploy:
    #   resources:
    #     limits: { cpus: '0.5', memory: 256M }

  # ─── Microservices ──────────────────────────────────────────────────────
  auth-service:
    image: ${REGISTRY:-localhost}/neural-erp-auth:${TAG:-latest}
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: neural_erp_auth
    restart: always
    environment:
      <<: *node-env
      AUTH_SERVICE_PORT: 3001
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  academic-service:
    image: ${REGISTRY:-localhost}/neural-erp-academic:${TAG:-latest}
    build:
      context: .
      dockerfile: services/academic-service/Dockerfile
    container_name: neural_erp_academic
    restart: always
    environment:
      <<: *node-env
      ACADEMIC_SERVICE_PORT: 3002
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  attendance-service:
    image: ${REGISTRY:-localhost}/neural-erp-attendance:${TAG:-latest}
    build:
      context: .
      dockerfile: services/attendance-service/Dockerfile
    container_name: neural_erp_attendance
    restart: always
    environment:
      <<: *node-env
      ATTENDANCE_SERVICE_PORT: 3003
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  timetable-service:
    image: ${REGISTRY:-localhost}/neural-erp-timetable:${TAG:-latest}
    build:
      context: .
      dockerfile: services/timetable-service/Dockerfile
    container_name: neural_erp_timetable
    restart: always
    environment:
      <<: *node-env
      TIMETABLE_SERVICE_PORT: 3004
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  assignment-service:
    image: ${REGISTRY:-localhost}/neural-erp-assignment:${TAG:-latest}
    build:
      context: .
      dockerfile: services/assignment-service/Dockerfile
    container_name: neural_erp_assignment
    restart: always
    environment:
      <<: *node-env
      ASSIGNMENT_SERVICE_PORT: 3005
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  grade-service:
    image: ${REGISTRY:-localhost}/neural-erp-grade:${TAG:-latest}
    build:
      context: .
      dockerfile: services/grade-service/Dockerfile
    container_name: neural_erp_grade
    restart: always
    environment:
      <<: *node-env
      GRADE_SERVICE_PORT: 3006
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  career-service:
    image: ${REGISTRY:-localhost}/neural-erp-career:${TAG:-latest}
    build:
      context: .
      dockerfile: services/career-service/Dockerfile
    container_name: neural_erp_career
    restart: always
    environment:
      <<: *node-env
      CAREER_SERVICE_PORT: 3007
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  notes-service:
    image: ${REGISTRY:-localhost}/neural-erp-notes:${TAG:-latest}
    build:
      context: .
      dockerfile: services/notes-service/Dockerfile
    container_name: neural_erp_notes
    restart: always
    environment:
      <<: *node-env
      NOTES_SERVICE_PORT: 3008
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  fee-service:
    image: ${REGISTRY:-localhost}/neural-erp-fee:${TAG:-latest}
    build:
      context: .
      dockerfile: services/fee-service/Dockerfile
    container_name: neural_erp_fee
    restart: always
    environment:
      <<: *node-env
      FEE_SERVICE_PORT: 3009
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  library-service:
    image: ${REGISTRY:-localhost}/neural-erp-library:${TAG:-latest}
    build:
      context: .
      dockerfile: services/library-service/Dockerfile
    container_name: neural_erp_library
    restart: always
    environment:
      <<: *node-env
      LIBRARY_SERVICE_PORT: 3010
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  forum-service:
    image: ${REGISTRY:-localhost}/neural-erp-forum:${TAG:-latest}
    build:
      context: .
      dockerfile: services/forum-service/Dockerfile
    container_name: neural_erp_forum
    restart: always
    environment:
      <<: *node-env
      FORUM_SERVICE_PORT: 3011
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  notification-service:
    image: ${REGISTRY:-localhost}/neural-erp-notification:${TAG:-latest}
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: neural_erp_notification
    restart: always
    environment:
      <<: *node-env
      NOTIFICATION_SERVICE_PORT: 3012
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  admin-service:
    image: ${REGISTRY:-localhost}/neural-erp-admin:${TAG:-latest}
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: neural_erp_admin
    restart: always
    environment:
      <<: *node-env
      ADMIN_SERVICE_PORT: 3013
    depends_on:
      - postgres
      - redis
    networks:
      - neural_network

  # ─── Python ML service ──────────────────────────────────────────────────
  ml-service:
    image: ${REGISTRY:-localhost}/neural-erp-ml:${TAG:-latest}
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    container_name: neural_erp_ml_service
    restart: always
    environment:
      ML_DATA_MODE: ${ML_DATA_MODE:-demo}
      ML_MODEL_DIR: /app/models
      ML_ADMIN_TOKEN: ${ML_ADMIN_TOKEN:-change-me-shared-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql://neural_admin:neural_secret_2026@postgres:5432/neural_erp}
    volumes:
      - ml_models:/app/models
    depends_on:
      - postgres
    networks:
      - neural_network
    # deploy:
    #   resources:
    #     limits: { cpus: '1.0', memory: 1024M }

  # ─── Edge / TLS termination (HTTP only — front with Caddy for TLS) ─────
  nginx:
    image: nginx:alpine
    container_name: neural_erp_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web/dist:/usr/share/nginx/html:ro
    depends_on:
      - gateway
    networks:
      - neural_network
    # deploy:
    #   resources:
    #     limits: { cpus: '0.5', memory: 128M }

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  ml_models:

networks:
  neural_network:
    driver: bridge
